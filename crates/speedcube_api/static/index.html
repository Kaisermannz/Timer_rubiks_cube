<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#05050a" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <title>SpeedTimer</title>

        <link rel="manifest" href="/manifest.json" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap"
            rel="stylesheet"
        />

        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"
        ></script>
        <script src="https://cdn.tailwindcss.com"></script>

        <style>
            /* ─── Design Tokens ─────────────────────────────────────── */
            :root {
                --neon: #00ff88;
                --neon-20: rgba(0, 255, 136, 0.2);
                --neon-10: rgba(0, 255, 136, 0.1);
                --neon-05: rgba(0, 255, 136, 0.05);
                --bg: #05050a;
                --surface: #09090f;
                --surface-2: #0e0e17;
                --border: #141420;
                --border-2: #1d1d2e;
                --text-hi: #dddde8;
                --text-mid: #42425a;
                --text-lo: #1c1c2a;
            }

            /* ─── Base ──────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                font-family: "JetBrains Mono", "Courier New", monospace;
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
            }

            body {
                background: var(--bg);
                color: var(--text-hi);
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }

            /* ─── Scanlines ─────────────────────────────────────────── */
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 3px,
                    rgba(0, 255, 136, 0.011) 3px,
                    rgba(0, 255, 136, 0.011) 4px
                );
                pointer-events: none;
                z-index: 9998;
            }

            /* ─── Vignette ───────────────────────────────────────────── */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(
                    ellipse at 50% 50%,
                    transparent 35%,
                    rgba(0, 0, 0, 0.65) 100%
                );
                pointer-events: none;
                z-index: 1;
            }

            /* ─── Keyframes ──────────────────────────────────────────── */

            /* Dot blink — step, not ease */
            @keyframes blink {
                0%,
                49% {
                    opacity: 1;
                }
                50%,
                100% {
                    opacity: 0;
                }
            }

            /* Timer pulsing neon — ready state */
            @keyframes readyPulse {
                0%,
                100% {
                    text-shadow:
                        0 0 18px rgba(0, 255, 136, 0.7),
                        0 0 50px rgba(0, 255, 136, 0.3),
                        0 0 90px rgba(0, 255, 136, 0.1);
                }
                50% {
                    text-shadow:
                        0 0 30px rgba(0, 255, 136, 1),
                        0 0 80px rgba(0, 255, 136, 0.5),
                        0 0 130px rgba(0, 255, 136, 0.2);
                }
            }

            /* Timer dim breathe — running state */
            @keyframes dimBreath {
                0%,
                100% {
                    color: #1e1e2c;
                    text-shadow: 0 0 20px rgba(0, 255, 136, 0.04);
                }
                50% {
                    color: #26263a;
                    text-shadow: 0 0 30px rgba(0, 255, 136, 0.07);
                }
            }

            /* Slide-in from right — sidebar */
            @keyframes slideInRight {
                from {
                    transform: translateX(2rem);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            /* Fade-up — UI elements */
            @keyframes fadeUp {
                from {
                    transform: translateY(0.4rem);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            /* ─── Timer States ───────────────────────────────────────── */
            .timer-idle {
                color: var(--text-hi);
                text-shadow: none;
                transition:
                    color 0.2s ease,
                    text-shadow 0.2s ease;
            }

            .timer-ready {
                color: var(--neon) !important;
                animation: readyPulse 0.75s ease-in-out infinite;
            }

            .timer-running {
                animation: dimBreath 2.8s ease-in-out infinite;
            }

            .timer-inspection {
                color: var(--neon) !important;
                animation: readyPulse 0.75s ease-in-out infinite;
            }

            /* ─── Dot blink ──────────────────────────────────────────── */
            .dot-blink {
                animation: blink 1.4s step-end infinite;
            }

            /* ─── Scrollbar ──────────────────────────────────────────── */
            ::-webkit-scrollbar {
                width: 2px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(0, 255, 136, 0.12);
                border-radius: 2px;
            }

            /* ─── Alpine cloak ───────────────────────────────────────── */
            [x-cloak] {
                display: none !important;
            }

            /* ─── Solve rows ─────────────────────────────────────────── */
            .solve-row td {
                padding: 0.55rem 1rem;
                font-size: 0.7rem;
                color: var(--text-mid);
                border-bottom: 1px solid var(--border);
                transition: color 0.15s;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 0;
            }
            .solve-row:hover td {
                color: var(--text-hi);
                background: var(--neon-05);
            }
            .solve-row td.time-cell {
                color: var(--text-hi);
                font-weight: 700;
                letter-spacing: 0.05em;
            }
            .solve-row td:first-child {
                padding-right: 0.5rem;
            }
            .solve-row td:nth-child(2) {
                border-left: 1px solid var(--border-2);
                padding-left: 0.75rem;
            }
            .solve-row:hover td.time-cell {
                color: var(--neon);
            }

            /* ─── Neon chip / badge ──────────────────────────────────── */
            .neon-chip {
                display: inline-flex;
                align-items: center;
                padding: 0.15rem 0.5rem;
                border-radius: 2px;
                border: 1px solid rgba(0, 255, 136, 0.22);
                background: rgba(0, 255, 136, 0.06);
                color: var(--neon);
                font-size: 0.55rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            /* ─── Icon button ────────────────────────────────────────── */
            .icon-btn {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.35rem 0.65rem;
                border: 1px solid var(--border-2);
                border-radius: 3px;
                background: var(--bg);
                color: var(--text-mid);
                font-size: 0.55rem;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                transition:
                    border-color 0.2s,
                    color 0.2s,
                    background 0.2s,
                    box-shadow 0.2s;
                cursor: pointer;
            }
            .icon-btn:hover {
                border-color: rgba(0, 255, 136, 0.25);
                color: var(--text-hi);
                box-shadow: 0 0 10px rgba(0, 255, 136, 0.06);
            }
            .icon-btn.active {
                border-color: rgba(0, 255, 136, 0.35);
                background: rgba(0, 255, 136, 0.07);
                color: var(--neon);
                box-shadow: 0 0 14px rgba(0, 255, 136, 0.1);
            }

            /* ─── Ao5 badge ──────────────────────────────────────────── */
            .ao5-badge {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.35rem 0.75rem;
                border: 1px solid var(--border-2);
                border-radius: 3px;
                background: var(--bg);
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            .ao5-badge:hover {
                border-color: rgba(0, 255, 136, 0.2);
                box-shadow: 0 0 10px rgba(0, 255, 136, 0.05);
            }

            /* ─── Scramble container ─────────────────────────────────── */
            #scramble-container {
                font-size: clamp(1rem, 2vw, 1.5rem);
                letter-spacing: 0.14em;
                line-height: 2;
                color: var(--text-mid);
                text-align: center;
                max-width: 42rem;
                margin-bottom: 3rem;
            }

            /* ─── Timer number ───────────────────────────────────────── */
            #timer-display {
                font-size: clamp(5rem, 19vw, 13.5rem);
                font-weight: 800;
                line-height: 1;
                letter-spacing: -0.02em;
                transition: color 0.15s ease;
            }

            /* ─── Sidebar panel ──────────────────────────────────────── */
            #history-panel {
                width: 17rem;
                border-left: 1px solid var(--border);
                background: var(--surface);
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
            }

            /* ─── Status bar ─────────────────────────────────────────── */
            #status-bar {
                font-size: 0.58rem;
                letter-spacing: 0.38em;
                text-transform: uppercase;
                color: var(--text-lo);
                text-align: center;
            }

            /* ─── Grid underlay on header ────────────────────────────── */
            .dot-grid {
                background-image: radial-gradient(
                    circle,
                    rgba(0, 255, 136, 0.06) 1px,
                    transparent 1px
                );
                background-size: 22px 22px;
            }
        </style>
    </head>

    <body
        class="h-screen flex flex-col"
        x-data="timerApp()"
        x-cloak
        @keydown.window="handleKeydown($event)"
        @keyup.window="handleKeyup($event)"
    >
        <!-- ═══ HEADER ════════════════════════════════════════════════ -->
        <header
            x-show="!running"
            x-transition:leave="transition duration-150 ease-in"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-2"
            x-transition:enter="transition duration-300 ease-out"
            x-transition:enter-start="opacity-0 -translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0"
            class="relative z-10 flex items-center justify-between px-6 py-3 border-b shrink-0 dot-grid"
            style="background: var(--surface); border-color: var(--border)"
        >
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <span
                    class="dot-blink inline-block w-2 h-2 rounded-full shrink-0"
                    style="
                        background: var(--neon);
                        box-shadow: 0 0 8px var(--neon);
                    "
                ></span>
                <div class="flex items-baseline gap-0">
                    <span
                        class="text-xs font-bold tracking-[0.5em]"
                        style="color: var(--neon)"
                        >SPEED</span
                    >
                    <span
                        class="text-xs font-bold tracking-[0.5em]"
                        style="color: var(--text-mid)"
                        >TIMER</span
                    >
                </div>
                <span class="neon-chip ml-1">3×3×3</span>
            </div>

            <!-- Right: Ao5 + toggle -->
            <div class="flex items-center gap-2">
                <!-- Ao5 -->
                <div class="ao5-badge">
                    <span
                        style="
                            color: var(--text-lo);
                            font-size: 0.52rem;
                            letter-spacing: 0.25em;
                            text-transform: uppercase;
                        "
                        >Ao5</span
                    >
                    <span
                        class="font-bold"
                        style="color: var(--neon); font-size: 0.8rem"
                        hx-get="/stats/333/ao5"
                        hx-trigger="load, solveSaved from:body"
                        >--:--</span
                    >
                </div>

                <!-- Panel toggle -->
                <button
                    @click="showPanel = !showPanel"
                    class="icon-btn"
                    :class="{ 'active': showPanel }"
                >
                    <!-- panel icon -->
                    <svg
                        width="13"
                        height="13"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <rect x="3" y="3" width="18" height="18" rx="1.5" />
                        <line x1="15" y1="3" x2="15" y2="21" />
                    </svg>
                    <span class="hidden sm:inline">Panel</span>
                </button>
            </div>
        </header>

        <!-- ═══ MAIN ══════════════════════════════════════════════════ -->
        <main class="flex-grow flex overflow-hidden relative z-[2]">
            <!-- ─── Timer zone ─────────────────────────────────────── -->
            <section
                class="flex-1 flex flex-col items-center justify-center px-8 py-6 relative"
                @touchstart="handleTouchstart($event)"
                @touchend="handleTouchend($event)"
                @contextmenu.prevent
            >
                <!-- Scramble (hidden when running) -->
                <div
                    x-show="!running"
                    x-transition:leave="transition duration-120 ease-in"
                    x-transition:leave-start="opacity-100"
                    x-transition:leave-end="opacity-0"
                    x-transition:enter="transition duration-350 ease-out"
                    x-transition:enter-start="opacity-0 translate-y-1"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    id="scramble-container"
                    hx-get="/scramble/333"
                    hx-trigger="load, solveSaved from:body"
                >
                    Cargando...
                </div>

                <!-- ▶ TIMER — always present in DOM ◀ -->
                <div
                    id="timer-display"
                    :class="{
                    'timer-ready':      isReady,
                    'timer-inspection': inspection && !isReady,
                    'timer-running':    running,
                    'timer-idle':       !running && !isReady && !inspection
                    }"
                    x-text="inspection ? formatInspection(inspectionTime) : formatTime(time)"
                >
                    0.00
                </div>

                <!-- Hint — hidden when running -->
                <div
                    x-show="!running"
                    x-transition:leave="transition duration-100 ease-in"
                    x-transition:leave-start="opacity-100"
                    x-transition:leave-end="opacity-0"
                    x-transition:enter="transition duration-500 ease-out"
                    x-transition:enter-start="opacity-0"
                    x-transition:enter-end="opacity-100"
                    id="status-bar"
                    class="absolute bottom-7"
                >
                    <span x-show="!isReady && !inspection"
                        >presiona&nbsp;[&nbsp;espacio&nbsp;]&nbsp;para
                        inspeccionar</span
                    >
                    <span
                        x-show="inspection && !isReady"
                        style="
                            color: var(--neon);
                            animation: readyPulse 0.75s ease-in-out infinite;
                        "
                    >
                        inspeccionando...
                    </span>
                    <span
                        x-show="isReady"
                        style="
                            color: var(--neon);
                            animation: readyPulse 0.75s ease-in-out infinite;
                        "
                    >
                        suelta para iniciar...
                    </span>
                </div>
            </section>

            <!-- ─── Sidebar: Historial ─────────────────────────────── -->
            <aside
                id="history-panel"
                x-show="showPanel && !running"
                x-transition:enter="transition ease-out duration-250"
                x-transition:enter-start="opacity-0 translate-x-6"
                x-transition:enter-end="opacity-100 translate-x-0"
                x-transition:leave="transition ease-in duration-180"
                x-transition:leave-start="opacity-100 translate-x-0"
                x-transition:leave-end="opacity-0 translate-x-6"
                class="hidden md:flex"
            >
                <!-- Panel header -->
                <div
                    class="flex items-center justify-between px-4 py-3 border-b shrink-0"
                    style="border-color: var(--border)"
                >
                    <div class="flex items-center gap-2.5">
                        <span
                            style="
                                color: var(--text-mid);
                                font-size: 0.58rem;
                                letter-spacing: 0.3em;
                                text-transform: uppercase;
                                font-weight: 700;
                            "
                        >
                            Sesión
                        </span>
                        <span class="neon-chip">3×3×3</span>
                    </div>
                    <button
                        @click="showPanel = false"
                        class="p-1 rounded transition-colors duration-150"
                        style="color: var(--text-mid)"
                        onmouseover="this.style.color = 'var(--text-hi)'"
                        onmouseout="this.style.color = 'var(--text-mid)'"
                        title="Cerrar panel"
                    >
                        <svg
                            width="13"
                            height="13"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                        >
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <!-- Column labels -->
                <div
                    class="grid px-4 py-2 border-b shrink-0"
                    style="
                        grid-template-columns: 2rem 1px 5.5rem 1fr;
                        border-color: var(--border);
                        gap: 0.5rem;
                    "
                >
                    <span
                        style="
                            color: var(--text-lo);
                            font-size: 0.5rem;
                            letter-spacing: 0.25em;
                            text-transform: uppercase;
                        "
                        >#</span
                    >
                    <span
                        style="
                            width: 1px;
                            background: var(--border-2);
                        "
                    ></span>
                    <span
                        style="
                            color: var(--text-lo);
                            font-size: 0.5rem;
                            letter-spacing: 0.25em;
                            text-transform: uppercase;
                        "
                        >Tiempo</span
                    >
                    <span
                        style="
                            color: var(--text-lo);
                            font-size: 0.5rem;
                            letter-spacing: 0.25em;
                            text-transform: uppercase;
                        "
                        >Scramble</span
                    >
                </div>

                <!-- Scrollable solve list -->
                <div class="flex-1 overflow-y-auto">
                    <table class="w-full text-left border-collapse table-fixed">
                        <colgroup>
                            <col style="width: 2rem" />
                            <col style="width: 5.5rem" />
                            <col />
                        </colgroup>
                        <tbody
                            hx-get="/history/333"
                            hx-trigger="load, solveSaved from:body"
                            id="history-body"
                            @click="onHistoryClick($event)"
                        ></tbody>
                    </table>
                </div>

                <!-- Panel footer: separator line -->
                <div
                    class="px-4 py-2.5 border-t shrink-0 flex items-center gap-2"
                    style="border-color: var(--border)"
                >
                    <div
                        class="flex-1 h-px"
                        style="background: var(--border-2)"
                    ></div>
                    <span
                        style="
                            color: var(--text-lo);
                            font-size: 0.5rem;
                            letter-spacing: 0.3em;
                        "
                        >FIN DE SESIÓN</span
                    >
                    <div
                        class="flex-1 h-px"
                        style="background: var(--border-2)"
                    ></div>
                </div>
            </aside>
        </main>

        <!-- ═══ SOLVE DETAIL MODAL ════════════════════════════════════ -->
        <div
            x-show="solveDetail"
            class="fixed inset-0 z-50 flex items-center justify-center"
            style="background: rgba(0, 0, 0, 0.65)"
            @click="closeSolveDetail()"
        >
            <div
                class="max-w-sm w-full mx-4 p-5 border"
                style="
                    background: var(--surface);
                    border-color: var(--border);
                    border-radius: 4px;
                "
                @click.stop
            >
                <!-- header -->
                <div class="flex items-center justify-between mb-4">
                    <span
                        class="text-xs font-mono"
                        style="color: var(--text-mid)"
                        x-text="solveDetail.num"
                    ></span>
                    <button
                        @click="closeSolveDetail()"
                        class="text-xs font-mono"
                        style="
                            color: var(--text-mid);
                            cursor: pointer;
                            background: none;
                            border: none;
                        "
                    >
                        ✕
                    </button>
                </div>

                <!-- time -->
                <div
                    class="text-3xl font-bold font-mono mb-3"
                    style="color: var(--neon)"
                    x-text="solveDetail.time_formatted"
                ></div>

                <!-- scramble -->
                <div
                    class="text-xs font-mono leading-relaxed break-all"
                    style="color: var(--text-mid)"
                    x-text="solveDetail.scramble"
                ></div>
            </div>
        </div>

        <!-- ═══ ALPINE APP ════════════════════════════════════════════ -->
        <script>
            function timerApp() {
                return {
                    /* ── State ───────────────────────────── */
                    time: 0,
                    running: false,
                    isReady: false,
                    readyStartTime: 0,
                    interval: null,
                    startTime: 0,
                    showPanel: true,

                    inspection: false,
                    inspectionTime: 15000,
                    inspectionInterval: null,

                    solveDetail: null,

                    /* ── Format ──────────────────────────── */
                    formatTime(ms) {
                        return (ms / 1000).toFixed(2);
                    },

                    formatInspection(ms) {
                        return Math.max(0, ms / 1000).toFixed(2);
                    },

                    /* ── Keyboard ────────────────────────── */
                    handleKeydown(e) {
                        if (e.code === "Space") {
                            e.preventDefault();
                            if (this.running) {
                                this.stopTimer();
                            } else if (this.inspection && !this.isReady) {
                                this.time = 0;
                                this.isReady = true;
                                this.readyStartTime = Date.now();
                            } else if (!this.inspection && !this.isReady) {
                                this.inspection = true;
                                this.inspectionTime = 15000;
                                this.inspectionInterval = setInterval(() => {
                                    this.inspectionTime -= 10;
                                    if (this.inspectionTime <= 0) {
                                        this.handleDNF();
                                    }
                                }, 10);
                            }
                        }
                    },

                    handleKeyup(e) {
                        if (e.code === "Space") {
                            if (this.isReady) {
                                const held = Date.now() - this.readyStartTime;
                                this.isReady = false;
                                if (held >= 200) {
                                    this.inspection = false;
                                    clearInterval(this.inspectionInterval);
                                    this.inspectionInterval = null;
                                    this.startTimer();
                                }
                            }
                        }
                    },
                    /* ── Touch (Móviles) ─────────────────────── */
                                        handleTouchstart(e) {
                                            // Evita comportamientos raros del navegador al tocar
                                            e.preventDefault();

                                            if (this.running) {
                                                this.stopTimer();
                                            } else if (this.inspection && !this.isReady) {
                                                this.time = 0;
                                                this.isReady = true;
                                                this.readyStartTime = Date.now();
                                            } else if (!this.inspection && !this.isReady) {
                                                this.inspection = true;
                                                this.inspectionTime = 15000;
                                                this.inspectionInterval = setInterval(() => {
                                                    this.inspectionTime -= 10;
                                                    if (this.inspectionTime <= 0) {
                                                        this.handleDNF();
                                                    }
                                                }, 10);
                                            }
                                        },

                                        handleTouchend(e) {
                                            // Solo procesamos el soltar si estábamos en estado 'Ready'
                                            if (this.isReady) {
                                                const held = Date.now() - this.readyStartTime;
                                                this.isReady = false;

                                                // 200ms de protección, igual que en PC
                                                if (held >= 200) {
                                                    this.inspection = false;
                                                    clearInterval(this.inspectionInterval);
                                                    this.inspectionInterval = null;
                                                    this.startTimer();
                                                }
                                            }
                                        },

                    /* ── Timer controls ──────────────────── */
                    startTimer() {
                        this.time = 0;
                        this.running = true;
                        this.startTime = Date.now();
                        this.interval = setInterval(() => {
                            this.time = Date.now() - this.startTime;
                        }, 10);
                    },

                    stopTimer() {
                        this.running = false;
                        clearInterval(this.interval);
                        this.saveSolve("None");
                    },

                    handleDNF() {
                        this.inspection = false;
                        this.isReady = false;
                        clearInterval(this.inspectionInterval);
                        this.inspectionInterval = null;
                        if (!this.running) {
                            this.saveSolve("DNF");
                        }
                    },

                    /* ── History click ──────────────────── */
                    onHistoryClick(e) {
                        const tr = e.target.closest("tr");
                        if (!tr) return;
                        const id = tr.dataset.id;
                        if (!id) return;
                        if (e.target.closest("button")) return;

                        const timeMs = parseInt(tr.dataset.time);
                        const penalty = tr.dataset.penalty;
                        const scramble = tr.dataset.scramble;
                        const num = tr.dataset.num;

                        let timeFormatted;
                        if (penalty === "DNF") {
                            timeFormatted = "DNF";
                        } else {
                            const secs = timeMs / 1000;
                            timeFormatted =
                                penalty === "PlusTwo"
                                    ? `${(secs + 2).toFixed(2)} (+2)`
                                    : `${secs.toFixed(2)}`;
                        }

                        this.solveDetail = {
                            num,
                            time_formatted: timeFormatted,
                            scramble,
                        };
                    },

                    closeSolveDetail() {
                        this.solveDetail = null;
                    },

                    /* ── Persist solve ───────────────────── */
                    async saveSolve(penalty) {
                        const scrambleEl =
                            document.getElementById("scramble-container");
                        const currentScramble = scrambleEl
                            ? scrambleEl.innerText
                            : "";
                        await fetch("/solve", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                id: null,
                                event_code: "333",
                                time_ms: penalty === "DNF" ? 0 : this.time,
                                penalty: penalty,
                                scramble: currentScramble,
                            }),
                        });
                        document.body.dispatchEvent(new Event("solveSaved"));
                    },
                };
            }
        </script>
        <script>
                    // Registrar Service Worker para PWA
                    if ('serviceWorker' in navigator) {
                        window.addEventListener('load', () => {
                            navigator.serviceWorker.register('/sw.js')
                                .then(reg => console.log('SW registrado', reg))
                                .catch(err => console.log('Error SW', err));
                        });
                    }
                </script>
            </body>
        </html>
    </body>
</html>
